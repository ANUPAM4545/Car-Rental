<!doctype html>
<html>
<head>
    <title>Agency Dashboard</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #e9ecef; text-align: center;">

    <div style="width: 500px; margin: 50px auto; background-color: #ffffff; padding: 20px; border: 1px solid #ccc; text-align: left;">
        <h1 style="margin-top: 0; text-align: center;">Agency Dashboard</h1>
        
        <div style="margin-bottom: 20px; padding: 15px; border: 1px solid #eee; background-color: #fafafa;">
            <h2 style="margin-top: 0;">List a New Car</h2>
            <form action="/add-car" method="post">
                <div style="margin-bottom: 5px;">
                    <input name="model" placeholder="Model" required style="width: 100%; box-sizing: border-box; padding: 5px;">
                </div>
                <div style="margin-bottom: 5px;">
                    <input name="number" placeholder="Number (e.g. ABC 123)" required style="width: 100%; box-sizing: border-box; padding: 5px;">
                </div>
                <div style="margin-bottom: 5px;">
                    <input name="seats" type="number" placeholder="Seats" required style="width: 100%; box-sizing: border-box; padding: 5px;">
                </div>
                <div style="margin-bottom: 10px;">
                    <input name="rent" type="number" placeholder="Rent Per Day ($)" required style="width: 100%; box-sizing: border-box; padding: 5px;">
                </div>
                <button type="submit" style="padding: 5px 15px;">Add Car to Fleet</button>
            </form>
        </div>
        
        <h2 style="font-size: 18px; margin-top: 30px; border-top: 1px solid #ddd; padding-top: 15px;">Incoming Booking Requests</h2>
        <div id="incoming-requests" style="margin-top: 10px; margin-bottom: 20px;"></div>

        <h2 style="font-size: 18px;">All Cars on Platform</h2>
        <div id="cars" style="margin-top: 10px;"></div>

        <script>
            function loadCars() {
                fetch('/cars')
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    if (data.length === 0) {
                        html = '<p>No cars available.</p>';
                    }
                    data.forEach(car => {
                        html += `
                          <div style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; background-color: #f9f9f9;">
                              <strong>Model:</strong> ${car.model} <br>
                              <strong>Plate:</strong> ${car.number} <br>
                              <strong>Seats:</strong> ${car.seats} | <strong>Rent:</strong> $${car.rent}/day
                              <div style="margin-top: 10px;">
                                <a href="/edit-car/${car.id}" style="padding: 3px 10px; border: 1px solid #000; text-decoration: none; color: black; background: #eee; font-size: 14px;">Edit Details</a>
                              </div>
                          </div>
                        `;
                    });
                    document.getElementById('cars').innerHTML = html;
                })
                .catch(err => console.error("Error loading cars:", err));
            }

            function loadRequests() {
                fetch('/agency-requests')
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    if (data.error) {
                        html = '<p>Error loading requests.</p>';
                    } else if (data.length === 0) {
                        html = '<p>No pending booking requests.</p>';
                    } else {
                        data.forEach(req => {
                            html += `
                            <div style="border: 1px solid #ffba00; padding: 10px; margin-bottom: 10px; background-color: #fffaf0;">
                                <strong>Customer:</strong> ${req.customer_name} wants to rent your <strong>${req.model} (${req.number})</strong> <br>
                                <strong>Duration:</strong> ${req.days} Days <br>
                                <div style="margin-top: 10px; display: flex; gap: 10px;">
                                    <form action="/agency-requests/action" method="POST" style="margin: 0;">
                                        <input type="hidden" name="booking_id" value="${req.id}">
                                        <input type="hidden" name="action" value="confirmed">
                                        <button type="submit" style="background: green; color: white; padding: 5px 10px; border: none; cursor: pointer;">Approve</button>
                                    </form>
                                    <form action="/agency-requests/action" method="POST" style="margin: 0;">
                                        <input type="hidden" name="booking_id" value="${req.id}">
                                        <input type="hidden" name="action" value="rejected">
                                        <button type="submit" style="background: red; color: white; padding: 5px 10px; border: none; cursor: pointer;">Reject</button>
                                    </form>
                                </div>
                            </div>
                            `;
                        });
                    }
                    document.getElementById('incoming-requests').innerHTML = html;
                })
                .catch(err => console.error(err));
            }

            // Load automatically
            window.onload = function() {
                loadCars();
                loadRequests();
            };
        </script>

        <div style="margin-top: 20px; text-align: center; border-top: 1px solid #ddd; padding-top: 10px;">
            <a href="/logout">Log Out</a>
        </div>
    </div>

</body>
</html>
