<!DOCTYPE html>
<html>
<head>
    <title>Car Rental</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #e9ecef; text-align: center;">
    
    <div style="width: 600px; margin: 50px auto; background-color: #ffffff; padding: 30px; border: 1px solid #ccc;">
        <h1 style="margin-top: 0;">Car Rental System</h1>
        <p>Welcome to our car rental service. Browse available cars below.</p>
        
        <div style="margin-top: 20px; margin-bottom: 30px;" id="auth-links">
            <a href="/login" style="padding: 5px 15px; border: 1px solid #000; text-decoration: none; color: black; background: #eee;">Login</a> &nbsp;&nbsp;&nbsp;
            <a href="/customer-signup" style="padding: 5px 15px; border: 1px solid #000; text-decoration: none; color: black; background: #eee;">Sign Up (Customer)</a>&nbsp;&nbsp;&nbsp;
            <a href="/agency-signup" style="padding: 5px 15px; border: 1px solid #000; text-decoration: none; color: black; background: #eee;">Sign Up (Agency)</a>
        </div>
        
        <h2 style="font-size: 18px; text-align: left; border-bottom: 1px solid #ddd; padding-bottom: 5px;">Available Cars to Rent</h2>
        <div id="cars" style="text-align: left; margin-top: 15px;"></div>
    </div>

    <script>
        function loadCars() {
            // Check auth status first
            fetch('/auth-status')
            .then(res => res.json())
            .then(auth => {
                const loggedIn = auth.loggedIn;
                const isCustomer = auth.role === 'customer';
                
                if (loggedIn) {
                    document.getElementById('auth-links').innerHTML = `
                        <p>Logged in as ${auth.role}. <a href="/dashboard">Go to Dashboard</a> | <a href="/logout">Log Out</a></p>
                    `;
                }

                // Now fetch cars
                fetch('/cars')
                .then(res => res.json())
                .then(data => {
                    let html = '';
                    if (data.length === 0) {
                        html = '<p>No cars available right now.</p>';
                    }
                    data.forEach(car => {
                        let formHtml = '';
                        if (loggedIn && !isCustomer) {
                            formHtml = `<p style="font-size: 12px; color: red; margin-top: 5px;">You must be a customer to book this car.</p>`;
                        } else {
                            // Either customer or not logged in
                            let dateInputHtml = '';
                            if (loggedIn && isCustomer) {
                                // show start date
                                dateInputHtml = `<input type='date' name='start_date' required style="padding: 3px; display: block; margin-bottom: 5px; width: 140px;">`;
                            }
                            // Form will post to /rent. If not logged in, server redirects.
                            formHtml = `
                                <form action='/rent' method='POST' style="margin-top: 10px;">
                                    <input type='hidden' name='car_id' value='${car.id}'>
                                    ${dateInputHtml}
                                    <select name='days' required style="padding: 3px; margin-right: 5px;">
                                        <option value="">Days...</option>
                                        <option value="1">1 Day</option>
                                        <option value="2">2 Days</option>
                                        <option value="3">3 Days</option>
                                        <option value="7">1 Week</option>
                                        <option value="14">2 Weeks</option>
                                    </select>
                                    <button type="submit" style="padding: 3px 10px;">Rent Car</button>
                                </form>
                            `;
                        }

                        html += `
                          <div style="border: 1px solid #ccc; padding: 15px; margin-bottom: 15px; background-color: #f9f9f9;">
                              <strong>Model:</strong> ${car.model} | <strong>Seats:</strong> ${car.seats} <br>
                              <strong>Number:</strong> ${car.number} <br>
                              <strong>Rent:</strong> $${car.rent}/day
                              ${formHtml}
                          </div>
                        `;
                    });
                    document.getElementById('cars').innerHTML = html;
                })
                .catch(err => console.error("Error loading cars:", err));
            });
        }
        
        window.onload = loadCars;
    </script>
</body>
</html>
