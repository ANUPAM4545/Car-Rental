<!doctype html>
<html>
<head>
    <title>Edit Car Details</title>
</head>
<body style="font-family: Arial, sans-serif; background-color: #e9ecef; text-align: center;">

    <div style="width: 500px; margin: 50px auto; background-color: #ffffff; padding: 20px; border: 1px solid #ccc; text-align: left;">
        <h1 style="margin-top: 0; text-align: center;">Edit Car</h1>
        
        <div style="margin-bottom: 20px; padding: 15px; border: 1px solid #eee; background-color: #fafafa;">
            <form id="editForm" method="post">
                <div style="margin-bottom: 5px;">
                    <label>Model:</label>
                    <input id="model" name="model" required style="width: 100%; box-sizing: border-box; padding: 5px;">
                </div>
                <div style="margin-bottom: 5px;">
                    <label>Number Plate:</label>
                    <input id="number" name="number" required style="width: 100%; box-sizing: border-box; padding: 5px;">
                </div>
                <div style="margin-bottom: 5px;">
                    <label>Capacity (Seats):</label>
                    <input id="seats" name="seats" type="number" required style="width: 100%; box-sizing: border-box; padding: 5px;">
                </div>
                <div style="margin-bottom: 15px;">
                    <label>Rent Per Day ($):</label>
                    <input id="rent" name="rent" type="number" required style="width: 100%; box-sizing: border-box; padding: 5px;">
                </div>
                <button type="submit" style="padding: 5px 15px;">Save Changes</button>
                <a href="/dashboard" style="display: inline-block; padding: 5px 15px; margin-left: 10px; border: 1px solid #000; text-decoration: none; color: black; background: #eee;">Cancel</a>
            </form>
        </div>

        <script>
            // Extract the Car ID from the URL path (/edit-car/:id)
            const pathParts = window.location.pathname.split('/');
            const carId = pathParts[pathParts.length - 1];
            
            // Set form action dynamically
            document.getElementById('editForm').action = '/edit-car/' + carId;

            // Load original details
            fetch('/api/car/' + carId)
            .then(res => res.json())
            .then(car => {
                document.getElementById('model').value = car.model;
                document.getElementById('number').value = car.number;
                document.getElementById('seats').value = car.seats;
                document.getElementById('rent').value = car.rent;
            })
            .catch(err => alert("Failed to fetch car details."));
        </script>
    </div>

</body>
</html>
